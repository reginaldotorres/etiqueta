<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Etiqueta</title>

  <!-- Biblioteca de código de barras -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
    }

    .etiqueta {
      width: 80mm;
      height: 55mm;
      padding: 6px;
      position: relative;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    h3 {
      text-align: center;
      margin: 0 0 6px 0;
      font-weight: bold;
      font-size: 16px;
    }

    p {
      margin: 3px 0;
      font-size: 13px;
      line-height: 1;
    }

    img#barcode {
      width: 100%;
      height: 35px;
      margin-top: 3px;
    }

    img#qrcode {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 75px;
      height: 75px;
    }

    #btnImprimir {
      margin-bottom: 15px;
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    @media print {
      #btnImprimir {
        display: none;
      }
      @page {
        size: landscape;
        margin: 3mm;
      }
    }
  </style>
</head>

<body onload="carregarEtiqueta()">

  <button id="btnImprimir" onclick="window.print()">Imprimir</button>

  <div class="etiqueta">
    <h3 id="empresa"></h3>

    <p><strong>Código:</strong> <span id="codigo"></span></p>
    <p><strong>Descrição:</strong> <span id="descricao"></span></p>
    <p><strong>Lote:</strong> <span id="lote"></span></p>
    <p><strong>Peso Líquido:</strong> <span id="pesoliquido"></span></p>
    <p><strong>UC:</strong> <span id="uc"></span></p>

    <img id="barcode" />
    <img id="qrcode" src="" alt="QR Code" />
  </div>

  <script>
    function carregarEtiqueta() {
      const params = new URLSearchParams(window.location.search);

      document.getElementById("empresa").innerText = params.get("empresa") || "";
      document.getElementById("codigo").innerText = params.get("codigo") || "";
      document.getElementById("descricao").innerText = params.get("descricao") || "";
      document.getElementById("lote").innerText = params.get("lote") || "";
      document.getElementById("pesoliquido").innerText = params.get("pesoliquido") || "";

      // UC + Código de barras
      const uc = params.get("uc") || "";
      document.getElementById("uc").innerText = uc;

      if (uc) {
        JsBarcode("#barcode", uc, {
          format: "CODE128",
          displayValue: false,
          height: 28,
          width: 0.8,        // mais fino ainda
          margin: 30
        });
      }

      // QR Code (mantido)
      const qr = params.get("qr");
      if (qr) {
        document.getElementById("qrcode").src = decodeURIComponent(qr);
      }
    }
  </script>

</body>
</html>
