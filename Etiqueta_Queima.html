<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Etiqueta</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
    }

    .etiqueta {
      width: 80mm;
      height: 55mm;
      padding: 6px;
      box-sizing: border-box;
      position: relative;
    }

    h3 {
      text-align: center;
      margin: 0 0 4px 0;
      font-size: 14px;
      font-weight: bold;
    }

    p {
      margin: 2px 0;
      font-size: 12px;
      line-height: 1;
    }

    /* Container QR UC */
    .qr-uc {
      position: absolute;
      bottom: 6px;
      left: 6px;
      text-align: center;
    }

    .qr-uc span {
      font-size: 10px;
      font-weight: bold;
      display: block;
      margin-bottom: 2px;
    }

    .qr-uc img {
      width: 60px;
      height: 60px;
    }

    /* QR principal */
    #qrcode1 {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 60px;
      height: 60px;
    }

    #btnImprimir {
      margin-bottom: 15px;
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    @media print {
      #btnImprimir {
        display: none;
      }
      @page {
        size: landscape;
        margin: 3mm;
      }
    }
  </style>
</head>

<body onload="carregarEtiqueta()">

  <button id="btnImprimir" onclick="window.print()">Imprimir</button>

  <div class="etiqueta">

    <h3 id="empresa"></h3>

    <p><strong>Código:</strong> <span id="codigo"></span></p>
    <p><strong>Descrição:</strong> <span id="descricao"></span></p>
    <p><strong>Lote:</strong> <span id="lote"></span></p>
    <p><strong>Peso Líquido:</strong> <span id="pesoliquido"></span></p>
    <p><strong>UC:</strong> <span id="uc"></span></p>

    <!-- QR UC com texto acima -->
    <div class="qr-uc">
      <span id="uc_text"></span>
      <img id="qrcodeUC" src="" alt="QR UC" />
    </div>

    <!-- QR principal -->
    <img id="qrcode1" src="" alt="QR Principal" />

  </div>

  <script>
    function carregarEtiqueta() {
      const params = new URLSearchParams(window.location.search);

      document.getElementById("empresa").innerText = params.get("empresa") || "";
      document.getElementById("codigo").innerText = params.get("codigo") || "";
      document.getElementById("descricao").innerText = params.get("descricao") || "";
      document.getElementById("lote").innerText = params.get("lote") || "";
      document.getElementById("pesoliquido").innerText = params.get("pesoliquido") || "";

      const uc = params.get("uc") || "";
      document.getElementById("uc").innerText = uc;
      document.getElementById("uc_text").innerText = uc;

      // QR principal (mantido)
      const qr1 = params.get("qr");
      if (qr1) {
        document.getElementById("qrcode1").src = decodeURIComponent(qr1);
      }

      // 🔴 QR da UC em vermelho
      if (uc) {
        document.getElementById("qrcodeUC").src =
          "https://api.qrserver.com/v1/create-qr-code/?size=120x120&color=255-0-0&data=" +
          encodeURIComponent(uc);
      }
    }
  </script>

</body>
</html>
