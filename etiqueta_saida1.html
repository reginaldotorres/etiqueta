<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Etiqueta</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
}

/* BOTÃO */
#btnImprimir{
    margin:15px;
    padding:8px 18px;
    font-size:16px;
    cursor:pointer;
}

/* ETIQUETA */
.etiqueta{

    width:200mm;   /* 20 cm */
    height:100mm;  /* 10 cm */

    padding:10mm;

    box-sizing:border-box;

    display:flex;
    flex-direction:column;

    position:relative;
}

/* TÍTULO */
h3{
    text-align:center;
    margin:0 0 12px 0;
    font-size:26px;
    font-weight:bold;
}

/* LINHAS */
p{

    margin:6px 0;

    font-size:18px;

    line-height:1.2;
}

/* QR CODE */

#qrcode{

    position:absolute;

    bottom:10mm;

    right:10mm;

    width:130px;

    height:130px;

}

/* IMPRESSÃO */

@media print{

#btnImprimir{
display:none;
}

body{
margin:0;
}

@page{
size:200mm 100mm; /* 20 x 10 cm */
margin:0;
}

}

</style>

</head>


<body onload="carregarEtiqueta()">

<button id="btnImprimir" onclick="window.print()">Imprimir</button>


<div class="etiqueta">

<h3>Núcleo Ind. e Com. de Ferroligas LTDA</h3>

<p>
<strong>PV:</strong>
<span id="pv"></span>

&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;

<strong>OC:</strong>
<span id="oc"></span>

&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;

<strong>DN:</strong>
<span id="dn"></span>
</p>


<p>

<strong>Parceiro:</strong>

<span id="cod_parceiro"></span>

<strong>&nbsp;-&nbsp;</strong>

<span id="parceiro"></span>

</p>


<p>

<strong>Código:</strong>

<span id="codigo"></span>

<strong>&nbsp;-&nbsp;</strong>

<span id="descricao"></span>

</p>


<p>

<strong>Granulometria:</strong>

<span id="granulometria"></span>

</p>


<p>

<strong>Peso Bruto:</strong>

<span id="pesobruto"></span>

&nbsp;KG

</p>


<p>

<strong>Peso Líquido:</strong>

<span id="pesoliquido"></span>

&nbsp;KG

</p>


<p>

<strong>Lote:</strong>

<span id="lote"></span>

</p>


<p>

<strong>Fabricação:</strong>

<span id="pvdata"></span>

</p>


<p>

<strong>Validade:</strong>

Indeterminada

</p>


<img id="qrcode" src="" alt="QR Code">


</div>



<script>

function carregarEtiqueta(){

const params = new URLSearchParams(window.location.search);

document.getElementById("pv").innerText = params.get("pv") || "";

document.getElementById("oc").innerText = params.get("oc") || "";

document.getElementById("dn").innerText = params.get("dn") || "";

document.getElementById("granulometria").innerText = params.get("granulometria") || "";

document.getElementById("pvdata").innerText = params.get("pvdata") || "";

document.getElementById("cod_parceiro").innerText = params.get("cod_parceiro") || "";

document.getElementById("parceiro").innerText = params.get("parceiro") || "";

document.getElementById("codigo").innerText = params.get("codigo") || "";

document.getElementById("descricao").innerText = params.get("descricao") || "";

document.getElementById("pesobruto").innerText = params.get("pesobruto") || "";

document.getElementById("pesoliquido").innerText = params.get("pesoliquido") || "";

document.getElementById("lote").innerText = params.get("lote") || "";

const qr = params.get("qr");

if(qr){

document.getElementById("qrcode").src = decodeURIComponent(qr);

}

}

</script>

</body>
</html>
