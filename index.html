<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>OP de Entrada</title>

<style>

body{
font-family: Arial;
padding:20px;
}

h2{
text-align:center;
}

.linha-info{
display:flex;
gap:60px;
margin-bottom:10px;
flex-wrap:wrap;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #000;
padding:6px;
font-size:12px;
}

th{
background:#eee;
}

@media print{
button{display:none;}
}

</style>

</head>

<body onload="carregarRelatorio()">

<button onclick="window.print()">Gerar PDF</button>

<h2>Ordem Produção de Entrada</h2>

<p><strong>Ordem:</strong> <span id="ordem"></span></p>

<div class="linha-info">
<span><strong>Empresa:</strong> <span id="empresa"></span></span>
<span><strong>Inicio:</strong> <span id="inicio"></span></span>
<span><strong>Termino:</strong> <span id="termino"></span></span>
<span><strong>Total:</strong> <span id="total"></span></span>
<span><strong>Peso PC:</strong> <span id="pesoPC"></span></span>
<span><strong>Diferença:</strong> <span id="diferenca"></span></span>
</div>

<table id="tabela">

<thead>
<tr>
<th>UC</th>
<th>Código</th>
<th>Descrição</th>
<th>Lote</th>
<th>Quantidade</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

function carregarRelatorio(){

const params = new URLSearchParams(window.location.search);

// CAMPOS
const ordem = params.get("ordem") || "";
const empresa = params.get("empresa") || "";
const inicio = params.get("inicio") || "";
const termino = params.get("termino") || "";

// PESO PC (converter para número)
let pesoPC = params.get("pesoPC") || 0;
pesoPC = parseFloat(String(pesoPC).replace(",", ".")) || 0;

document.getElementById("ordem").textContent = ordem;
document.getElementById("empresa").textContent = empresa;
document.getElementById("inicio").textContent = inicio;
document.getElementById("termino").textContent = termino;

// DADOS
const dados = JSON.parse(decodeURIComponent(params.get("dados")));

const tbody = document.querySelector("#tabela tbody");

let totalQuantidade = 0;

dados.forEach(item => {

let qtd = parseFloat(String(item.Quantidade).replace(",", ".")) || 0;

totalQuantidade += qtd;

let linha = `
<tr>
<td>${item.UC}</td>
<td>${item.Codigo}</td>
<td>${item.Descricao}</td>
<td>${item.Lote}</td>
<td>${qtd.toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2})}</td>
</tr>
`;

tbody.innerHTML += linha;

});

// FORMATAR NÚMEROS
const totalFormatado = totalQuantidade.toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2});
const pesoPCFormatado = pesoPC.toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2});

// DIFERENÇA
const diferenca = pesoPC - totalQuantidade;
const diferencaFormatada = diferenca.toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2});

// MOSTRAR
document.getElementById("total").textContent = totalFormatado;
document.getElementById("pesoPC").textContent = pesoPCFormatado;
document.getElementById("diferenca").textContent = diferencaFormatada;

}

</script>

</body>
</html>
