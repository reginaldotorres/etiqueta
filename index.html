<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OP de Entrada</title>

<style>

body{
font-family: Arial;
padding:20px;
}

h2{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #000;
padding:6px;
font-size:12px;
}

th{
background:#eee;
}

@media print{
button{display:none;}
}

</style>

</head>

<body onload="carregarRelatorio()">

<button onclick="window.print()">Gerar PDF</button>

<h2>Ordem Produção de Entrada</h2>

<p><strong>Ordem:</strong> <span id="ordem"></span></p>
<p><strong>Início:</strong> <span id="inicio"></span></p>
<p><strong>Término:</strong> <span id="termino"></span></p>
  

<table id="tabela">

<thead>
<tr>
<th>UC</th>
<th>Código</th>
<th>Descrição</th>
<th>Lote</th>
<th>Quantidade</th>
<th>Empresa</th>
<th>Deposito</th>
<th>Criado</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

function carregarRelatorio(){

const params = new URLSearchParams(window.location.search);

const ordem = params.get("ordem");
document.getElementById("ordem").textContent = ordem || "";

const dados = JSON.parse(decodeURIComponent(params.get("dados")));


// ordenar por data
dados.sort((a,b) => new Date(a.Criado) - new Date(b.Criado));

// pegar primeiro e último
const inicio = dados[0].Criado;
const termino = dados[dados.length - 1].Criado;

// formatar data
document.getElementById("inicio").textContent =
  new Date(inicio).toLocaleString();

document.getElementById("termino").textContent =
  new Date(termino).toLocaleString();

  

const tbody = document.querySelector("#tabela tbody");

dados.forEach(item => {

let linha = `
<tr>
<td>${item.UC}</td>
<td>${item.Codigo}</td>
<td>${item.Descricao}</td>
<td>${item.Lote}</td>
<td>${item.Quantidade}</td>
<td>${item.Empresa}</td>
<td>${item.Deposito}</td>
<td>${item.Criado}</td>
</tr>
`;

tbody.innerHTML += linha;

});

}

</script>

</body>
</html>
