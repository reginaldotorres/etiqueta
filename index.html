<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>OP de Entrada</title>

<style>

body{
font-family: Arial;
padding:20px;
}

h2{
text-align:center;
}

.linha-info{
display:flex;
gap:60px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #000;
padding:6px;
font-size:12px;
}

th{
background:#eee;
}

.total{
margin-top:10px;
font-weight:bold;
font-size:14px;
}

@media print{
button{display:none;}
}

</style>

</head>

<body onload="carregarRelatorio()">

<button onclick="window.print()">Gerar PDF</button>

<h2>Ordem Produção de Entrada</h2>

<p><strong>Ordem:</strong> <span id="ordem"></span></p>

<div class="linha-info">
<span><strong>Empresa:</strong> <span id="empresa"></span></span>
<span><strong>Inicio:</strong> <span id="inicio"></span></span>
<span><strong>Termino:</strong> <span id="termino"></span></span>
<span><strong>Total:</strong> <span id="total"></span></span>
<span><strong>Peso PC:</strong> <span id="pesoPC"></span></span>
</div>

<table id="tabela">

<thead>
<tr>
<th>UC</th>
<th>Código</th>
<th>Descrição</th>
<th>Lote</th>
<th>Quantidade</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

function carregarRelatorio(){

const params = new URLSearchParams(window.location.search);

// ORDEM
const ordem = params.get("ordem");
document.getElementById("ordem").textContent = ordem || "";

// EMPRESA
const empresa = params.get("empresa");
document.getElementById("empresa").textContent = empresa || "";

// INICIO
const inicio = params.get("inicio");
document.getElementById("inicio").textContent = inicio || "";

// TERMINO
const termino = params.get("termino");
document.getElementById("termino").textContent = termino || "";


// TERMINO
const pesoPC = params.get("pesoPC");
document.getElementById("pesoPC").textContent = pesoPC || "";


// DADOS
const dados = JSON.parse(decodeURIComponent(params.get("dados")));

const tbody = document.querySelector("#tabela tbody");

let totalQuantidade = 0;

dados.forEach(item => {

document.getElementById("total").textContent =
totalQuantidade.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});

let linha = `
<tr>
<td>${item.UC}</td>
<td>${item.Codigo}</td>
<td>${item.Descricao}</td>
<td>${item.Lote}</td>
<td>${item.Quantidade}</td>
</tr>
`;

tbody.innerHTML += linha;

});

// MOSTRAR TOTAL
document.getElementById("total").textContent = totalQuantidade;

}

</script>

</body>
</html>
