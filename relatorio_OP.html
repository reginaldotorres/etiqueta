
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerta de Desvio</title>

    <style>
        @page {
            size: 80mm 60mm;
            margin: 0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
        }

        .etiqueta {
            width: 80mm;
            height: 60mm;
            padding: 3mm;
            page-break-after: always;
            break-after: page;

            display: flex;
            flex-direction: column;
        }

        .titulo {
            text-align: center;
            font-size: 14pt;
            font-weight: bold;
            margin-bottom: 3mm;
        }

        .cabecalho {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9pt;
            margin-bottom: 3mm;
        }

        .label {
            font-weight: bold;
        }

        .obs-titulo {
            font-size: 9pt;
            font-weight: bold;
            margin-bottom: 1mm;
        }

        .observacao {
            flex: 1;
            font-size: 9pt;
            line-height: 1.2;
            white-space: pre-wrap;
            word-break: break-word;
            overflow: hidden;
        }

        .rodape {
            font-size: 7pt;
            color: #555;
            text-align: right;
            margin-top: 2mm;
        }

        @media print {
            body {
                margin: 0;
            }

            .etiqueta:last-child {
                page-break-after: auto;
            }
        }
    </style>
</head>

<body>

    <div id="etiquetas"></div>

    <script>

        const params = new URLSearchParams(window.location.search);

        const lote = params.get("lote") || "";
        const rnc = params.get("rnc") || "";
        const observacao = params.get("observacao") || "";

        let quantidade = parseInt(params.get("quantidade"));

        if (isNaN(quantidade) || quantidade < 1) {
            quantidade = 1;
        }

        const dataHora = new Date().toLocaleString("pt-BR");

        const container = document.getElementById("etiquetas");

        for (let i = 0; i < quantidade; i++) {

            container.innerHTML += `
                <div class="etiqueta">

                    <div class="titulo">
                        ALERTA DE DESVIO
                    </div>

                    <div class="cabecalho">
                        <div>
                            <span class="label">Lote:</span>
                            ${lote}
                        </div>

                        <div>
                            <span class="label">RNC:</span>
                            ${rnc}
                        </div>
                    </div>

                    <div class="obs-titulo">
                        Observação:
                    </div>

                    <div class="observacao">
                        ${observacao}
                    </div>

                    <div class="rodape">
                        Impressão: ${dataHora}
                    </div>

                </div>
            `;
        }

        window.onload = function () {
            setTimeout(() => window.print(), 300);
        };

    </script>

</body>

</html>
