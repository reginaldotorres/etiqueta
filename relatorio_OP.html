<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiqueta RNC</title>

<style>
    @page {
        size: 75mm 60mm;
        margin: 0;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 2mm;
        width: 80mm;
        height: 60mm;
        font-family: Arial, Helvetica, sans-serif;
        background: #fff;
        color: #000;
    }

    .container {
        width: 76mm;
        height: 56mm;
        display: flex;
        flex-direction: column;
    }

    .titulo {
        text-align: center;
        font-size: 13pt;
        font-weight: bold;
        margin-bottom: 3mm;
    }

    .cabecalho {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 3mm;
        font-size: 9pt;
    }

    .campo {
        font-size: 9pt;
    }

    .label {
        font-weight: bold;
    }

    .observacao {
        flex: 1;
        margin-top: 2mm;
        font-size: 9pt;
        line-height: 1.2;
        white-space: pre-wrap;
        word-break: break-word;
        overflow: hidden;
    }

    .rodape {
        margin-top: 2mm;
        font-size: 7pt;
        color: #555;
        text-align: right;
    }

    @media print {
        body {
            margin: 0;
            padding: 2mm;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div class="titulo">
        ALERTA DE DESVIO
    </div>

    <div class="cabecalho">
        <div class="campo">
            <span class="label">Lote:</span>
            <span id="lote"></span>
        </div>

        <div class="campo">
            <span class="label">RNC:</span>
            <span id="rnc"></span>
        </div>
    </div>

    <div class="campo">
        <span class="label">Observação:</span>
    </div>

    <div class="observacao" id="observacao"></div>

    <div class="rodape">
        Impressão: <span id="dataHora"></span>
    </div>

</div>

<script>
    const params = new URLSearchParams(window.location.search);

    document.getElementById("lote").textContent =
        params.get("lote") || "";

    document.getElementById("rnc").textContent =
        params.get("rnc") || "";

    document.getElementById("observacao").textContent =
        params.get("observacao") || "";

    document.getElementById("dataHora").textContent =
        new Date().toLocaleString("pt-BR");

    // Abre a impressão automaticamente
    window.onload = function () {
        setTimeout(() => window.print(), 300);
    };
</script>

</body>
</html>
