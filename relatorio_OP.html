<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de RNC</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f4f4f4;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: #ffffff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 10px rgba(0,0,0,.15);
        }

        .empresa {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .campo {
            margin-bottom: 15px;
        }

        .label {
            font-weight: bold;
        }

        .valor {
            display: inline-block;
            margin-left: 5px;
            word-break: break-word;
        }

        .observacao {
            min-height: 120px;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            margin-top: 5px;
            background: #fafafa;
        }

        .rodape {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
        }

        .data-impressao {
            font-size: 12px;
            color: #666;
        }

        #qrcode {
            width: 140px;
            height: 140px;
            border: 1px solid #ddd;
        }

        @media print {
            body {
                background: white;
            }

            .container {
                box-shadow: none;
                border: none;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="empresa">
        F4 Armazéns Gerais e Logística
    </div>

    <h1>Relatório de RNC</h1>

    <div class="campo">
        <span class="label">Lote:</span>
        <span class="valor" id="lote"></span>
    </div>

    <div class="campo">
        <span class="label">RNC:</span>
        <span class="valor" id="rnc"></span>
    </div>

    <div class="campo">
        <span class="label">Usuário:</span>
        <span class="valor" id="usuario"></span>
    </div>

    <div class="campo">
        <span class="label">Observação:</span>
        <div class="observacao" id="observacao"></div>
    </div>

    <div class="rodape">
        <div>
            <div class="data-impressao">
                Impressão: <span id="dataHora"></span>
            </div>
        </div>

        <div>
            <img id="qrcode" alt="QR Code">
        </div>
    </div>

</div>

<script>
    const params = new URLSearchParams(window.location.search);

    const lote = params.get("lote") || "";
    const rnc = params.get("rnc") || "";
    const observacao = params.get("observacao") || "";
    const usuario = params.get("usuario") || "";

    document.getElementById("lote").textContent = lote;
    document.getElementById("rnc").textContent = rnc;
    document.getElementById("observacao").textContent = observacao;
    document.getElementById("usuario").textContent = usuario;

    document.getElementById("dataHora").textContent =
        new Date().toLocaleString("pt-BR");

    const textoQR =
        "Lote: " + lote +
        "\nRNC: " + rnc +
        "\nUsuário: " + usuario;

    document.getElementById("qrcode").src =
        "https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=" +
        encodeURIComponent(textoQR);
</script>

</body>
</html>
